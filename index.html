<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Secure Secretary</title>
  <style>
    body { font-family: sans-serif; padding: 20px; text-align: center; background: #f8f9fa; }
    .container { max-width: 500px; margin: auto; }
    textarea { width: 100%; height: 150px; border-radius: 8px; border: 2px solid #ddd; padding: 10px; box-sizing: border-box; }
    button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; border: none; background: #1a73e8; color: white; font-weight: bold; cursor: pointer; }
    button:disabled { background: #ccc; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Secure Secretary</h2>
    <textarea id="transcript" placeholder="Speak or type..."></textarea>
    <button id="btn" onclick="processNote()">✨ Process & Save</button>
    <div id="status"></div>
  </div>

  <script>
    // ONLY the GAS URL goes here. No API Keys!
    const GAS_URL = "PASTE_YOUR_NEW_DEPLOYMENT_URL_HERE";

    async function processNote() {
      const text = document.getElementById('transcript').value;
      if (!text) return alert("Empty note!");
      
      const btn = document.getElementById('btn');
      const status = document.getElementById('status');
      
      btn.disabled = true;
      status.innerText = "AI is working...";

      try {
        // Step 1: Ask GAS to talk to Gemini
        const res = await fetch(GAS_URL, {
          method: "POST",
          body: JSON.stringify({ action: "parse", text: text })
        });
        const parsed = await res.json();
        
        status.innerText = `Found: ${parsed.customer}. Saving...`;

        // Step 2: Ask GAS to Save
        await fetch(GAS_URL, {
          method: "POST",
          body: JSON.stringify({ action: "addNote", ...parsed })
        });

        status.innerText = "✅ Saved to Sheet & Calendar!";
        document.getElementById('transcript').value = "";
      } catch (err) {
        status.innerText = "❌ Error: " + err.message;
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
