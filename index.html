<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>My Secretary</title>
  <style>
    body { font-family: 'Segoe UI', Roboto, sans-serif; padding: 20px; text-align: center; background: #f8f9fa; margin: 0; }
    .container { max-width: 500px; margin: auto; }
    h2 { color: #1a73e8; font-size: 28px; margin-top: 10px; }
    .hint { font-size: 14px; color: #5f6368; margin-bottom: 20px; background: #e8f0fe; padding: 12px; border-radius: 8px; border: 1px solid #c2d7ff; text-align: left; line-height: 1.4; }
    textarea { width: 100%; height: 200px; padding: 15px; border-radius: 12px; font-size: 18px; border: 2px solid #dadce0; box-sizing: border-box; margin-bottom: 10px; }
    button { width: 100%; padding: 18px; background: #1a73e8; color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.2s; margin: 8px 0; }
    button:active { background: #174ea6; transform: translateY(2px); }
    button:disabled { background: #ccc; cursor: not-allowed; }
    #logs { margin-top: 20px; text-align: left; max-height: 300px; overflow-y: auto; background: white; padding: 10px; border: 1px solid #dadce0; border-radius: 8px; font-family: monospace; font-size: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <h2>My Secretary</h2>
    <div class="hint"><b>Voice Triggers:</b> Customer, Meeting, Follow up</div>
    <button id="voiceBtn" onclick="startVoice()">🎤 Start Voice Note</button>
    <textarea id="transcript" placeholder="Voice will appear here..."></textarea>
    <button id="parseBtn" onclick="parseWithGemini()">✨ Parse with Gemini</button>
    <button id="saveBtn" onclick="saveNote()" style="background: #34a853;">💾 SAVE LOG & CALENDAR</button>
    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #ddd;">
    <button onclick="loadLogs()" style="background: #5f6368;">📋 View Recent Logs</button>
    <div id="logs">Recent logs...</div>
  </div>

  <script>
    // --- CONFIG ---
    const GEMINI_KEY = "AIzaSyCB_N8LmT4ewtStiEQ4hIZcQwILUpL9mc4";
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzYCJBduzgvMcWmF0TkVlFNf30RMPSQb_PGBDb3x2ZF_lPdR_XkoJhuprV5oeB1BtLC/exec";

    // Using a currently supported and stable model version
    const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-002:generateContent?key=${GEMINI_KEY}`;

    let parsedData = null;

    function setLoading(id, isLoading, text) {
      const b = document.getElementById(id);
      if (b) {
        b.disabled = isLoading;
        b.innerText = isLoading ? "Thinking..." : text;
      }
    }

    function startVoice() {
      const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!Speech) return alert("Use Chrome for voice support.");
      const recognition = new Speech();
      recognition.onresult = (e) => {
        document.getElementById('transcript').value = e.results[0][0].transcript;
        parseWithGemini();
      };
      recognition.onerror = (event) => {
        console.error("Speech recognition error:", event.error);
        alert("Voice recognition error: " + event.error);
      };
      recognition.start();
    }

    async function parseWithGemini() {
      const text = document.getElementById('transcript').value.trim();
      if (!text) return alert("No text provided.");

      setLoading('parseBtn', true, '');
      const prompt = `Extract into JSON only. Output raw JSON object with no extra text, no markdown, no explanations. Use exactly these keys:
{
  "customer": "full name or 'Unknown'",
  "meetingTime": "time like '2:30 PM' or empty string",
  "followUpDay": "day like 'Friday' or 'None'",
  "cleanNote": "the remaining details after removing triggers"
}
Note: ${text}`;

      const payload = {
        contents: [{
          parts: [{
            text: prompt
          }]
        }]
      };

      console.log("Sending to Gemini:", payload);

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        if (!res.ok) {
          const errorData = await res.json().catch(() => ({}));
          throw new Error(`HTTP ${res.status} - ${errorData.error?.message || "Unknown API error"}`);
        }

        const data = await res.json();
        console.log("Gemini raw response:", data);

        let aiText = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
        if (!aiText) throw new Error("No content returned from Gemini");

        // Clean up common markdown/escaping issues
        aiText = aiText.trim().replace(/^```json\s*/i, '').replace(/\s*```$/i, '');

        // Extract JSON object
        const match = aiText.match(/\{[\s\S]*\}/);
        if (!match) throw new Error("AI response did not contain valid JSON");

        parsedData = JSON.parse(match[0].trim());

        alert(`Parsed Successfully!\nCustomer: ${parsedData.customer || 'N/A'}\nTime: ${parsedData.meetingTime || '-'}\nFollow-up: ${parsedData.followUpDay || '-'}`);
      } catch (err) {
        alert("Gemini Error: " + err.message);
        console.error("Parse failed:", err);
      } finally {
        setLoading('parseBtn', false, '✨ Parse with Gemini');
      }
    }

    async function saveNote() {
      if (!parsedData) return alert("Parse first.");
      setLoading('saveBtn', true, '');
      try {
        await fetch(GAS_URL, {
          method: "POST",
          mode: "no-cors",
          body: JSON.stringify({ action: "addNote", ...parsedData })
        });
        alert("Saved successfully! (check your Sheet & Calendar)");
        document.getElementById('transcript').value = '';
        parsedData = null;
      } catch (err) {
        alert("Save failed: " + err.message);
        console.error(err);
      } finally {
        setLoading('saveBtn', false, '💾 SAVE LOG & CALENDAR');
      }
    }

    async function loadLogs() {
      document.getElementById('logs').innerText = "Loading...";
      try {
        const res = await fetch(GAS_URL + "?action=getNotes");
        const text = await res.text();
        document.getElementById('logs').innerHTML = text.replace(/\n/g, '<br>') || "No logs yet.";
      } catch (err) {
        alert("Load failed: " + err.message);
        document.getElementById('logs').innerText = "Failed to load logs.";
      }
    }
  </script>
</body>
</html>
