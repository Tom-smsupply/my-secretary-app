<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="logo-192.png">
  <title>My Secretary</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 20px; background: #f8f9fa; text-align: center; }
    .container { max-width: 500px; margin: auto; }
    h2 { color: #1a73e8; }
    button { width: 100%; padding: 18px; font-size: 18px; margin: 10px 0; background: #1a73e8; color: white; border: none; border-radius: 8px; }
    textarea { width: 100%; height: 150px; padding: 15px; font-size: 16px; border: 2px solid #dadce0; border-radius: 8px; }
  </style>
</head>
<body>
  <div class="container">
    <h2>My Secretary</h2>
    <p>Test page - if you see this, HTML is loading.</p>

    <button onclick="startVoice()">🎤 Start Voice Note</button>
    <textarea id="transcript" placeholder="Voice will appear here... (or type for test)"></textarea>
    <button onclick="saveNote()">SAVE TO SHEET & CALENDAR</button>
    <button onclick="testClick()">Test Click (should alert)</button>
  </div>

  <script>
    alert("JavaScript is running! If you see this popup, JS works.");

    function testClick() {
      alert("Test button works!");
    }

    function startVoice() {
      alert("Voice button clicked! (Mic would start if supported)");
    }

    function saveNote() {
      alert("Save button clicked!");
    }
  </script>
</body>
</html>
