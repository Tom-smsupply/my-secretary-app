<!DOCTYPE html>
<html>
<head>
  <title>Secretary Debug Version</title>
  <style>
    body { font-family: sans-serif; padding: 30px; text-align: center; }
    textarea { width: 100%; height: 100px; margin-bottom: 10px; }
    button { width: 100%; padding: 20px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; }
  </style>
</head>
<body>
  <h2>Secretary Debug Mode</h2>
  <textarea id="transcript" placeholder="Type something here first..."></textarea>
  
  <button id="processBtn" onclick="processNote()">✨ Step 1: Click to Start AI</button>

  <script>
    // 1. PASTE YOUR NEW DEPLOYMENT URL HERE
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzjYsZMkVXnieMfl4Mcy1UkMPYIkt3sLXRO7IOgiliJgCxDWlMC-XTafLtXij9wNP7P/exec";

    async function processNote() {
      alert("Step 1: The button works! Now trying to talk to Google...");
      
      const text = document.getElementById('transcript').value;
      if (!text) {
        alert("Error: The text box is empty. Type something first!");
        return;
      }

      try {
        alert("Step 2: Sending data to: " + GAS_URL);
        
        const res = await fetch(GAS_URL, {
          method: "POST",
          body: JSON.stringify({ action: "parse", text: text })
        });

        alert("Step 3: Google responded! Now trying to read the result...");
        
        const data = await res.json();
        alert("Success! AI found customer: " + data.customer);
        
      } catch (err) {
        alert("CRASH: " + err.message);
        console.error(err);
      }
    }
  </script>
</body>
</html>
