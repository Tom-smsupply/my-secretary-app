<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>My Secretary</title>
  <style>
    body { font-family: 'Segoe UI', Roboto, sans-serif; padding: 20px; text-align: center; background: #f8f9fa; margin: 0; }
    .container { max-width: 500px; margin: auto; }
    h2 { color: #1a73e8; font-size: 28px; margin-top: 10px; }
    .hint { font-size: 14px; color: #5f6368; margin-bottom: 20px; background: #e8f0fe; padding: 12px; border-radius: 8px; border: 1px solid #c2d7ff; text-align: left; line-height: 1.4; }
    textarea { width: 100%; height: 200px; padding: 15px; border-radius: 12px; font-size: 18px; border: 2px solid #dadce0; box-sizing: border-box; margin-bottom: 10px; }
    button { width: 100%; padding: 18px; background: #1a73e8; color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.2s; margin: 8px 0; }
    button:active { background: #174ea6; transform: translateY(2px); }
    button:disabled { background: #ccc; cursor: not-allowed; }
    #logs { margin-top: 20px; text-align: left; max-height: 300px; overflow-y: auto; background: white; padding: 10px; border: 1px solid #dadce0; border-radius: 8px; font-family: monospace; font-size: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <h2>My Secretary</h2>
    <div class="hint">
      <b>Try this:</b> "Customer John Doe meeting at 4 PM tomorrow follow up Friday"
    </div>
    <button id="voiceBtn" onclick="startVoice()">🎤 Start Voice Note</button>
    <textarea id="transcript" placeholder="Voice will appear here..."></textarea>
    <button id="parseBtn" onclick="parseWithGemini()">✨ Parse with Gemini</button>
    <button id="saveBtn" onclick="saveNote()" style="background: #34a853;">💾 SAVE LOG & CALENDAR</button>
    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #ddd;">
    <button onclick="loadLogs()" style="background: #5f6368;">📋 View Recent Logs</button>
    <div id="logs">Recent logs will appear here...</div>
  </div>

  <script>
    // --- CONFIG ---
    const GEMINI_KEY = "AIzaSyCB_N8LmT4ewtStiEQ4hIZcQwILUpL9mc4"; 
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzYCJBduzgvMcWmF0TkVlFNf30RMPSQb_PGBDb3x2ZF_lPdR_XkoJhuprV5oeB1BtLC/exec"; 
    
    // Stable endpoint
    const API_URL = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`;

    let parsedData = null; 

    function setLoading(isLoading, btnId, originalText) {
      const btn = document.getElementById(btnId);
      if (btn) {
        btn.disabled = isLoading;
        btn.innerText = isLoading ? "Processing..." : originalText;
      }
    }

    function startVoice() {
      const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!Speech) return alert("Use Chrome for voice support.");
      const recognition = new Speech();
      recognition.onstart = () => { document.getElementById('voiceBtn').innerText = "Listening..."; };
      recognition.onresult = (e) => {
        document.getElementById('transcript').value = e.results[0][0].transcript;
        parseWithGemini(); 
      };
      recognition.onend = () => { document.getElementById('voiceBtn').innerText = "🎤 Start Voice Note"; };
      recognition.start();
    }

    async function parseWithGemini() {
      const text = document.getElementById('transcript').value;
      if (!text.trim()) return alert("Enter some text first.");

      setLoading(true, 'parseBtn', '✨ Parse with Gemini');

      const payload = {
        contents: [{
          parts: [{
            text: `Extract the following note into a JSON object. Use ONLY these keys: "customer", "meetingTime", "followUpDay", "cleanNote". 

            Note: ${text}`
          }]
        }],
        generationConfig: {
          // Changed to camelCase for the v1 stable API
          responseMimeType: "application/json",
          temperature: 0.1
        }
      };

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error?.message || "API Error");

        // The response usually comes as a string inside the text field
        const aiResponseText = data.candidates[0].content.parts[0].text;
        parsedData = JSON.parse(aiResponseText);
        
        alert(`Parsed!\nCustomer: ${parsedData.customer}\nFollow-up: ${parsedData.followUpDay}`);
      } catch (err) {
        alert("Gemini Error: " + err.message);
        console.error(err);
      } finally {
        setLoading(false, 'parseBtn', '✨ Parse with Gemini');
      }
    }

    async function saveNote() {
      if (!parsedData) return alert("Parse first!");
      setLoading(true, 'saveBtn', '💾 SAVE LOG & CALENDAR');
      try {
        await fetch(GAS_URL, {
          method: "POST",
          mode: "no-cors", 
          body: JSON.stringify({ action: "addNote", ...parsedData })
        });
        alert("Saved to Google!");
        document.getElementById('transcript').value = '';
        parsedData = null;
      } catch (err) {
        alert("Save failed: " + err.message);
      } finally {
        setLoading(false, 'saveBtn', '💾 SAVE LOG & CALENDAR');
      }
    }

    async function loadLogs() {
      document.getElementById('logs').innerText = "Fetching...";
      try {
        const res = await fetch(GAS_URL + "?action=getNotes");
        const text = await res.text();
        document.getElementById('logs').innerHTML = text.replace(/\n/g, '<br>');
      } catch (err) {
        document.getElementById('logs').innerText = "Error loading.";
      }
    }
  </script>
</body>
</html>
